<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuzlocke Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --bg2: #13161e;
      --bg3: #1a1e28;
      --card: #1e2332;
      --card2: #252b3b;
      --border: #2e3650;
      --accent: #e63946;
      --accent2: #ff6b6b;
      --gold: #ffd166;
      --green: #06d6a0;
      --blue: #118ab2;
      --purple: #9b5de5;
      --text: #e8eaf0;
      --text2: #8892aa;
      --text3: #5a6278;
      --dead: #7f1d1d;
      --dead-bg: #1f0a0a;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app-wrapper { position: relative; z-index: 1; }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #0d0f14 0%, #1a1020 50%, #0d0f14 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle at 35% 35%, #fff 30%, #e63946 30%, #e63946 50%, #111 50%);
      border-radius: 50%;
      border: 3px solid #222;
      box-shadow: 0 0 0 2px var(--accent), 0 0 20px rgba(230,57,70,0.4);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: 1px;
    }

    .logo-text span {
      display: block;
      color: var(--accent);
      font-size: 7px;
      color: var(--text2);
      margin-top: 3px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ctrl-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--card2); border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn-icon { padding: 6px 8px; }

    /* Player count selector */
    .player-count-select {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .count-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .count-btn:hover { border-color: var(--accent); }
    .count-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(230,57,70,0.4);
    }

    /* ===== GAME SELECTOR ===== */
    .game-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select.game-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
    }
    select.game-select:focus { border-color: var(--accent); }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      padding: 24px 32px 48px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ===== RUN TITLE ===== */
    .run-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .run-name-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      padding: 8px 4px;
      outline: none;
      transition: border-color 0.2s;
      min-width: 200px;
    }
    .run-name-input:focus { border-bottom-color: var(--accent); }
    .run-name-input::placeholder { color: var(--text3); }

    /* ===== GYMS SECTION ===== */
    .gyms-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .gyms-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text2);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .gyms-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .gym-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      min-width: 64px;
    }

    .gym-badge:hover { border-color: var(--border); background: var(--card2); }

    .gym-badge.completed .badge-icon { filter: none; }
    .gym-badge:not(.completed) .badge-icon { filter: grayscale(100%) brightness(0.4); }

    .badge-icon {
      font-size: 28px;
      transition: transform 0.2s;
      line-height: 1;
    }
    .gym-badge.completed .badge-icon { transform: scale(1.1); }

    .badge-name {
      font-size: 9px;
      font-weight: 700;
      color: var(--text2);
      text-align: center;
      line-height: 1.3;
    }
    .gym-badge.completed .badge-name { color: var(--gold); }

    .badge-level {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text3);
    }

    /* ===== PLAYERS GRID ===== */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* ===== PLAYER CARD ===== */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .player-card:hover { border-color: var(--accent); }

    .player-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--card2), var(--card));
      border-bottom: 1px solid var(--border);
    }

    .player-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--border);
      object-fit: cover;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .player-avatar:hover { border-color: var(--accent); }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .player-info { flex: 1; min-width: 0; }

    .player-name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 2px 0;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .player-name-input:focus { border-bottom-color: var(--accent); }
    .player-name-input::placeholder { color: var(--text3); }

    .player-stats {
      display: flex;
      gap: 14px;
      margin-top: 4px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
    }
    .stat-item .stat-val {
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
    }
    .stat-item.deaths .stat-val { color: var(--accent); }

    .player-actions { display: flex; gap: 4px; }

    /* ===== TEAM GRID ===== */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
    }

    /* ===== POKEMON SLOT ===== */
    .poke-slot {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .poke-slot:hover:not(.dead) {
      border-color: var(--accent);
      background: var(--card2);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(230,57,70,0.15);
    }

    .poke-slot.empty {
      border-style: dashed;
      border-color: var(--text3);
      justify-content: center;
    }

    .poke-slot.empty:hover {
      border-color: var(--accent);
      border-style: dashed;
    }

    .poke-slot.dead {
      background: var(--dead-bg);
      border-color: var(--dead);
      cursor: pointer;
    }

    .poke-slot.dead::after {
      content: '💀';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: rgba(31, 10, 10, 0.65);
      border-radius: 9px;
      pointer-events: none;
    }

    .slot-add-icon {
      font-size: 24px;
      color: var(--text3);
      transition: color 0.2s;
      line-height: 1;
    }
    .poke-slot.empty:hover .slot-add-icon { color: var(--accent); }

    .slot-add-text {
      font-size: 9px;
      color: var(--text3);
      margin-top: 4px;
    }

    .poke-sprite {
      width: 72px;
      height: 72px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .poke-nickname {
      font-size: 9px;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .poke-species {
      font-size: 8px;
      color: var(--text2);
      margin-top: 1px;
    }

    .poke-types {
      display: flex;
      gap: 3px;
      margin-top: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .type-badge {
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 7px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .poke-location {
      font-size: 7px;
      color: var(--text3);
      margin-top: 3px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== DEAD BOX ===== */
    .dead-box {
      padding: 8px 12px 12px;
      border-top: 1px solid var(--border);
    }

    .dead-box-title {
      font-size: 9px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dead-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .dead-poke-mini {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--dead-bg);
      border: 1px solid var(--dead);
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 9px;
    }

    .dead-poke-mini img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: grayscale(100%);
    }

    /* ===== BOX MANAGEMENT ===== */
    .box-section {
      border-top: 1px solid var(--border);
    }

    .box-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .box-header:hover { background: var(--card2); }

    .box-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: 0.5px;
    }

    .box-toggle {
      font-size: 11px;
      color: var(--text3);
    }

    .box-body.hidden { display: none; }

    .box-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .box-slot {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 6px 5px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      width: 76px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }
    .box-slot:hover:not(.dead) {
      border-color: var(--accent);
      background: var(--card2);
    }
    .box-slot .poke-sprite { width: 44px; height: 44px; }
    .box-slot .poke-nickname { font-size: 8px; }
    .box-slot .poke-species { font-size: 7px; }
    .box-slot .type-badge { font-size: 6px; padding: 1px 3px; }
    .box-slot.dead { background: var(--dead-bg); border-color: var(--dead); opacity: 0.7; }
    .box-slot.dead::after {
      content: '💀';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(31, 10, 10, 0.65);
      border-radius: 7px;
      pointer-events: none;
    }

    .box-slot.box-add {
      border-style: dashed;
      border-color: var(--text3);
      justify-content: center;
      min-height: 66px;
    }
    .box-slot.box-add:hover { border-color: var(--accent); }
    .box-slot.box-add .slot-add-icon { font-size: 18px; }

    /* ===== SOULLINK ===== */
    .link-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      z-index: 2;
      box-shadow: 0 0 6px rgba(0,0,0,0.5);
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .links-empty {
      font-size: 12px;
      color: var(--text3);
      padding: 4px 2px;
    }

    .link-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .link-group.dead { opacity: 0.55; }

    .link-group-members {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .link-member {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--card2);
      border-radius: 6px;
      padding: 3px 8px 3px 4px;
    }
    .link-member img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .link-member-player {
      font-size: 9px;
      color: var(--text2);
      font-weight: 700;
    }
    .link-member-name {
      font-size: 11px;
      color: var(--text);
      font-weight: 600;
    }
    .link-connector {
      font-size: 12px;
      color: var(--text3);
    }

    .link-picker-list {
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 8px;
    }
    .link-picker-group { margin-bottom: 10px; }
    .link-picker-player {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .link-picker-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      background: var(--bg3);
      border: 1px solid var(--border);
      margin-bottom: 4px;
      transition: background 0.15s;
    }
    .link-picker-item:hover { background: var(--card2); border-color: var(--accent); }
    .link-picker-item.active { border-color: var(--accent); background: rgba(230,57,70,0.1); }
    .link-picker-item img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .link-picker-item span:not(.link-picker-tag) { font-size: 13px; font-weight: 600; flex: 1; }
    .link-picker-tag {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    /* ===== CONTEXT MENU ===== */
    .context-menu {
      position: fixed;
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(230,57,70,0.2);
      z-index: 9999;
      min-width: 180px;
      overflow: hidden;
      animation: menuIn 0.15s ease;
    }

    @keyframes menuIn {
      from { opacity: 0; transform: scale(0.92) translateY(-6px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .context-menu-header {
      padding: 10px 14px 8px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .context-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      color: var(--text);
      width: 100%;
      text-align: left;
    }
    .context-item:hover { background: var(--card2); }
    .context-item.danger:hover { background: var(--dead-bg); color: var(--accent); }
    .context-item .ci-icon { font-size: 16px; width: 20px; text-align: center; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-field {
      margin-bottom: 14px;
    }

    .modal-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .modal-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--text3); }

    .modal-preview {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
      min-height: 80px;
    }

    .preview-sprite {
      width: 72px;
      height: 72px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .preview-info { flex: 1; }

    .preview-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .preview-types {
      display: flex;
      gap: 4px;
    }

    .search-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    /* ===== TYPE COLORS ===== */
    .t-normal { background: #a8a878; color: #111; }
    .t-fire { background: #f08030; color: #111; }
    .t-water { background: #6890f0; color: #111; }
    .t-electric { background: #f8d030; color: #111; }
    .t-grass { background: #78c850; color: #111; }
    .t-ice { background: #98d8d8; color: #111; }
    .t-fighting { background: #c03028; color: #fff; }
    .t-poison { background: #a040a0; color: #fff; }
    .t-ground { background: #e0c068; color: #111; }
    .t-flying { background: #a890f0; color: #111; }
    .t-psychic { background: #f85888; color: #111; }
    .t-bug { background: #a8b820; color: #111; }
    .t-rock { background: #b8a038; color: #111; }
    .t-ghost { background: #705898; color: #fff; }
    .t-dragon { background: #7038f8; color: #fff; }
    .t-dark { background: #705848; color: #fff; }
    .t-steel { background: #b8b8d0; color: #111; }
    .t-fairy { background: #ee99ac; color: #111; }

    /* ===== SEARCH RESULTS ===== */
    .search-results {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 6px;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--card2); }

    .search-result-item img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .search-result-item .sr-name { font-size: 13px; font-weight: 600; }
    .search-result-item .sr-id { font-size: 11px; color: var(--text2); }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ===== HIDDEN ===== */
    .hidden { display: none !important; }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--card2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
      box-shadow: var(--shadow);
    }
    .toast.error { border-left-color: var(--accent); }

    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .main-content { padding: 16px; }
      header { padding: 12px 16px; }
      .players-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<div class="app-wrapper">

  <!-- HEADER -->
  <header>
    <div class="header-logo">
      <div class="logo-icon"></div>
      <div class="logo-text">
        NUZLOCKE TRACKER
        <span>COMMUNITY EDITION</span>
      </div>
    </div>
    <div class="header-controls">
      <span class="ctrl-label">Spieler:</span>
      <div class="player-count-select" id="playerCountSelect"></div>
      <div class="game-selector">
        <span class="ctrl-label">Spiel:</span>
        <select class="game-select" id="gameSelect"></select>
      </div>
      <button class="btn btn-sm" onclick="resetAll()">🔄 Reset</button>
    </div>
  </header>

  <div class="main-content">

    <!-- RUN TITLE -->
    <div class="run-title-bar">
      <input class="run-name-input" id="runName" placeholder="Run Name eingeben..." maxlength="60" />
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:12px;color:var(--text2);" id="totalDeathsLabel">Gesamt Tode: <b style="color:var(--accent)">0</b></span>
        <button class="btn btn-sm btn-primary" onclick="saveData()">💾 Speichern</button>
      </div>
    </div>

    <!-- GYMS -->
    <div class="gyms-section">
      <div class="gyms-title">🏅 Arena-Abzeichen</div>
      <div class="gyms-grid" id="gymsGrid"></div>
    </div>

    <!-- SOULLINKS -->
    <div class="gyms-section">
      <div class="gyms-title">🔗 Soullink-Verknüpfungen</div>
      <div class="links-list" id="linksSection"></div>
    </div>

    <!-- PLAYERS -->
    <div class="players-grid" id="playersGrid"></div>

  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- CONTEXT MENU -->
<div class="context-menu hidden" id="contextMenu"></div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">🎮 Pokémon hinzufügen</div>

    <div class="modal-preview" id="modalPreview">
      <div style="color:var(--text3);font-size:13px;text-align:center;width:100%;">Suche ein Pokémon...</div>
    </div>

    <div class="modal-field">
      <label class="modal-label">Pokémon Name / #ID</label>
      <input class="modal-input" id="pokeSearch" placeholder="z.B. Glumanda, pikachu, 25..." />
      <div id="searchResults" class="search-results hidden"></div>
    </div>

    <div class="modal-field">
      <label class="modal-label">Spitzname (optional)</label>
      <input class="modal-input" id="pokeNickname" placeholder='z.B. "Feuerball"' />
    </div>

    <div class="modal-field">
      <label class="modal-label">Fundort</label>
      <input class="modal-input" id="pokeLocation" placeholder="z.B. Route 1, Starter..." />
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmAddPokemon()">✅ Hinzufügen</button>
    </div>
  </div>
</div>

<!-- SOULLINK PICKER MODAL -->
<div class="modal-overlay hidden" id="linkPickerOverlay" onclick="if(event.target===this) closeLinkPicker()">
  <div class="modal">
    <div class="modal-title" id="linkPickerTitle">🔗 Verlinken</div>
    <div class="link-picker-list" id="linkPickerList"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeLinkPicker()">Schließen</button>

  </div>
</div>

// ============================================================
//  IDS & SOULLINK HELPERS
// ============================================================

function makeUid() {
  return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
}

// Iterate every pokemon in the whole run, calling fn(poke, pi, loc, idx)
function forEachPokemon(fn) {
  state.players.forEach((player, pi) => {
    player.team.forEach((poke, idx) => { if (poke) fn(poke, pi, 'team', idx); });
    player.box.forEach((poke, idx) => { fn(poke, pi, 'box', idx); });
    player.deadBox.forEach((poke, idx) => { fn(poke, pi, 'deadBox', idx); });
  });
}

function getPokeAt(pi, loc, idx) {
  const player = state.players[pi];
  if (!player) return null;
  if (loc === 'team') return player.team[idx] || null;
  if (loc === 'box') return player.box[idx] || null;
  if (loc === 'deadBox') return player.deadBox[idx] || null;
  return null;
}

// Find all OTHER pokemon (excluding the one at pi/loc/idx) sharing the same linkId
function getLinkPartners(pi, loc, idx) {
  const self = getPokeAt(pi, loc, idx);
  if (!self || !self.linkId) return [];
  const partners = [];
  forEachPokemon((poke, ppi, ploc, pidx) => {
    if (poke.linkId === self.linkId && !(ppi === pi && ploc === loc && pidx === idx)) {
      partners.push({ poke, pi: ppi, loc: ploc, idx: pidx });
    }
  });
  return partners;
}

function colorForLink(linkId) {
  let hash = 0;
  for (let i = 0; i < linkId.length; i++) hash = (hash * 31 + linkId.charCodeAt(i)) >>> 0;
  const hue = hash % 360;
  return `hsl(${hue}, 70%, 58%)`;
}

function linkBadge(poke) {
  if (!poke.linkId) return '';
  const color = colorForLink(poke.linkId);
  return `<div class="link-badge" style="background:${color}" title="🔗 Soullink aktiv">🔗</div>`;
}

  document.addEventListener('click', e => {
    if (!document.getElementById('contextMenu').contains(e.target)) {

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); hideContextMenu(); closeLinkPicker(); }
  });
}

function renderGameSelect() {
  const sel = document.getElementById('gameSelect');
  sel.innerHTML = GAMES.map(g => `<option value="${g.id}" ${g.id===state.gameId?'selected':''}>${g.name}</option>`).join('');
  sel.addEventListener('change', e => {
    state.gameId = e.target.value;
    state.completedGyms = [];
    renderGyms();
    saveData();
  });
}

function getGame() { return GAMES.find(g => g.id === state.gameId) || GAMES[0]; }

  const wrap = document.getElementById('playerCountSelect');
  wrap.innerHTML = [1,2,3,4,5,6].map(n =>
    `<button class="count-btn ${n===state.playerCount?'active':''}" onclick="setPlayerCount(${n})">${n}</button>`
  ).join('');
}

function setPlayerCount(n) {
  if (n === state.playerCount) return;
  state.playerCount = n;
  // Ensure players array has correct length
  while (state.players.length < n) {
    state.players.push(createPlayer(state.players.length + 1));
  }
  renderPlayerCountSelect();
  renderPlayers();
  saveData();
}

function createPlayer(num) {
  return {
    id: Date.now() + Math.random(),
    name: `Spieler ${num}`,
    team: new Array(6).fill(null),
    box: [],
    deadBox: []
  };
}

// ============================================================
//  GYMS
// ============================================================

function renderGyms() {
  const grid = document.getElementById('gymsGrid');
  const game = getGame();
  grid.innerHTML = game.gyms.map((gym, i) => `
    <div class="gym-badge ${state.completedGyms.includes(i)?'completed':''}" onclick="toggleGym(${i})">
      <span class="badge-icon">${gym.emoji}</span>
      <span class="badge-name">${gym.name}</span>
      <span class="badge-level">Lv ${gym.level}</span>
    </div>
  `).join('');
}

function toggleGym(i) {
  const idx = state.completedGyms.indexOf(i);
  if (idx >= 0) state.completedGyms.splice(idx, 1);
  else state.completedGyms.push(i);
  renderGyms();
  saveData();
}

// ============================================================
//  PLAYERS
// ============================================================

function renderPlayers() {
  const grid = document.getElementById('playersGrid');
  const count = state.playerCount;
  const players = state.players.slice(0, count);

  grid.innerHTML = players.map((p, pi) => renderPlayerCard(p, pi)).join('');

  // Bind name inputs
  players.forEach((p, pi) => {
    const inp = document.getElementById(`pname-${pi}`);
    if (inp) inp.addEventListener('input', e => {
      state.players[pi].name = e.target.value;
      saveData();
      renderLinks();
    });
  });

  renderLinks();
}

function renderPlayerCard(player, pi) {
  const deaths = player.deadBox.length;
  const teamHTML = player.team.map((poke, si) => renderPokeSlot(poke, pi, si)).join('');
  const collapsed = !!boxCollapsed[player.id];
  const boxHTML = `
    <div class="box-section">
      <div class="box-header" onclick="toggleBox(${pi})">
        <span class="box-title">📦 Box (${player.box.length})</span>
        <span class="box-toggle">${collapsed ? '▸' : '▾'}</span>
      </div>
      <div class="box-body ${collapsed ? 'hidden' : ''}">
        <div class="box-grid">
          ${player.box.map((poke, bi) => renderBoxSlot(poke, pi, bi)).join('')}
          <div class="box-slot box-add" onclick="event.stopPropagation();openModal(${pi},'box',null)">
            <span class="slot-add-icon">＋</span>
          </div>
        </div>
      </div>
    </div>
  `;
  const deadHTML = player.deadBox.length > 0 ? `
    <div class="dead-box">
      <div class="dead-box-title">💀 Friedhof (${player.deadBox.length})</div>
      <div class="dead-list">
        ${player.deadBox.map(p => `
          <div class="dead-poke-mini">
            <img src="${p.sprite}" alt="${p.species}" onerror="this.style.display='none'" />
            <span>${p.nickname || p.species}</span>
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  return `
    <div class="player-card" id="player-${pi}">
      <div class="player-header">
        <div class="player-avatar" id="avatar-${pi}" title="Avatar ändern" onclick="changeAvatar(${pi})">
          ${player.avatarUrl ? `<img src="${player.avatarUrl}" onerror="this.parentElement.innerHTML='👤'" />` : '👤'}
        </div>
        <div class="player-info">
          <input class="player-name-input" id="pname-${pi}" value="${escHtml(player.name)}" placeholder="Spielername..." maxlength="30" />
          <div class="player-stats">
            <div class="stat-item deaths">💀 Tode: <span class="stat-val">${deaths}</span></div>
          </div>
        </div>
        <div class="player-actions">
          <button class="btn btn-icon btn-sm" title="Avatar-URL" onclick="promptAvatar(${pi})">🖼️</button>
        </div>
      </div>
      <div class="team-grid">${teamHTML}</div>
      ${boxHTML}
      ${deadHTML}
    </div>
  `;
}

function toggleBox(pi) {
  const player = state.players[pi];
  boxCollapsed[player.id] = !boxCollapsed[player.id];
  renderPlayers();
}

function renderBoxSlot(poke, pi, bi) {
  const typeBadges = poke.types.map(t =>
    `<span class="type-badge t-${t}">${TYPE_DE[t] || t}</span>`
  ).join('');
  return `
    <div class="box-slot ${poke.dead ? 'dead' : ''}" onclick="openBoxContextMenu(event, ${pi}, ${bi})" data-pi="${pi}" data-bi="${bi}">
      ${linkBadge(poke)}
      <img class="poke-sprite" src="${poke.sprite}" alt="${poke.species}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png'" />
      ${poke.nickname ? `<div class="poke-nickname">"${escHtml(poke.nickname)}"</div>` : ''}
      <div class="poke-species">${escHtml(poke.species)}</div>
      <div class="poke-types">${typeBadges}</div>
    </div>
  `;
}

function renderPokeSlot(poke, pi, si) {
  if (!poke) {
    return `
      <div class="poke-slot empty" onclick="openContextMenu(event, ${pi}, ${si})" data-pi="${pi}" data-si="${si}">
        <span class="slot-add-icon">＋</span>
        <span class="slot-add-text">Leer</span>
      </div>
    `;
  }

  const typeBadges = poke.types.map(t =>
    `<span class="type-badge t-${t}">${TYPE_DE[t] || t}</span>`
  ).join('');

  return `
    <div class="poke-slot ${poke.dead ? 'dead' : ''}" onclick="openContextMenu(event, ${pi}, ${si})" data-pi="${pi}" data-si="${si}">
      ${linkBadge(poke)}
      <img class="poke-sprite" src="${poke.sprite}" alt="${poke.species}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png'" />
      ${poke.nickname ? `<div class="poke-nickname">"${escHtml(poke.nickname)}"</div>` : ''}
      <div class="poke-species">${escHtml(poke.species)}</div>
      <div class="poke-types">${typeBadges}</div>
      ${poke.location ? `<div class="poke-location">📍 ${escHtml(poke.location)}</div>` : ''}
    </div>
  `;
}

//  CONTEXT MENU
// ============================================================

function openContextMenu(event, pi, si) {
  event.stopPropagation();
  const menu = document.getElementById('contextMenu');
  const poke = state.players[pi]?.team[si];

  let items = '';

  if (poke) {
    if (!poke.dead) {
      items += `<button class="context-item danger" onclick="markDead(${pi},'team',${si});hideContextMenu()"><span class="ci-icon">💀</span> Als Tod markieren</button>`;
      items += `<button class="context-item" onclick="moveToBox(${pi},${si});hideContextMenu()"><span class="ci-icon">📦</span> In Box verschieben</button>`;
    } else {
      items += `<button class="context-item" onclick="revivePoke(${pi},'team',${si});hideContextMenu()"><span class="ci-icon">✨</span> Wiederbeleben</button>`;
    }
    items += linkMenuItems(pi, 'team', si);
    items += `<button class="context-item" onclick="openModal(${pi},'team',${si});hideContextMenu()"><span class="ci-icon">✏️</span> Pokémon ändern</button>`;
    items += `<button class="context-item danger" onclick="removePoke(${pi},'team',${si});hideContextMenu()"><span class="ci-icon">🗑️</span> Entfernen</button>`;
  } else {
    items += `<button class="context-item" onclick="openModal(${pi},'team',${si});hideContextMenu()"><span class="ci-icon">➕</span> Pokémon hinzufügen</button>`;
  }

  const header = poke
    ? `<div class="context-menu-header">
         <img src="${poke.sprite}" style="width:24px;height:24px;image-rendering:pixelated;object-fit:contain;" />
         ${escHtml(poke.nickname || poke.species)}
       </div>`
    : `<div class="context-menu-header">Slot ${si + 1}</div>`;

  menu.innerHTML = header + items;
  menu.classList.remove('hidden');

  // Position
  const rect = event.target.closest('.poke-slot').getBoundingClientRect();
  let x = rect.right + 8;
  let y = rect.top;
  if (x + 190 > window.innerWidth) x = rect.left - 190;
  if (y + menu.offsetHeight > window.innerHeight) y = window.innerHeight - menu.offsetHeight - 8;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

function openBoxContextMenu(event, pi, bi) {
  event.stopPropagation();
  const menu = document.getElementById('contextMenu');
  const poke = state.players[pi]?.box[bi];
  if (!poke) return;

  let items = '';
  if (!poke.dead) {
    items += `<button class="context-item danger" onclick="markDead(${pi},'box',${bi});hideContextMenu()"><span class="ci-icon">💀</span> Als Tod markieren</button>`;
    items += `<button class="context-item" onclick="moveToTeam(${pi},${bi});hideContextMenu()"><span class="ci-icon">⬆️</span> Ins Team verschieben</button>`;
  } else {
    items += `<button class="context-item" onclick="revivePoke(${pi},'box',${bi});hideContextMenu()"><span class="ci-icon">✨</span> Wiederbeleben</button>`;
  }
  items += linkMenuItems(pi, 'box', bi);
  items += `<button class="context-item" onclick="openModal(${pi},'box',${bi});hideContextMenu()"><span class="ci-icon">✏️</span> Pokémon ändern</button>`;
  items += `<button class="context-item danger" onclick="removePoke(${pi},'box',${bi});hideContextMenu()"><span class="ci-icon">🗑️</span> Entfernen</button>`;

  const header = `<div class="context-menu-header">
       <img src="${poke.sprite}" style="width:24px;height:24px;image-rendering:pixelated;object-fit:contain;" />
       ${escHtml(poke.nickname || poke.species)}
     </div>`;

  menu.innerHTML = header + items;
  menu.classList.remove('hidden');

  const rect = event.target.closest('.box-slot').getBoundingClientRect();
  let x = rect.right + 8;
  let y = rect.top;
  if (x + 190 > window.innerWidth) x = rect.left - 190;
  if (y + menu.offsetHeight > window.innerHeight) y = window.innerHeight - menu.offsetHeight - 8;
  menu.style.left = x + 'px';

function linkMenuItems(pi, loc, idx) {
  const poke = getPokeAt(pi, loc, idx);
  if (!poke) return '';
  if (poke.linkId) {
    const partners = getLinkPartners(pi, loc, idx);
    const names = partners.map(p => `${state.players[p.pi].name}: ${p.poke.nickname || p.poke.species}`).join(', ') || '?';
    return `<button class="context-item" onclick="openLinkPicker(${pi},'${loc}',${idx});hideContextMenu()"><span class="ci-icon">🔗</span> Verlinkt: ${escHtml(names)}</button>
            <button class="context-item danger" onclick="unlinkPokemon(${pi},'${loc}',${idx});hideContextMenu()"><span class="ci-icon">✂️</span> Link entfernen</button>`;
  }
  return `<button class="context-item" onclick="openLinkPicker(${pi},'${loc}',${idx});hideContextMenu()"><span class="ci-icon">🔗</span> Soullink verknüpfen</button>`;
}

function hideContextMenu() {
  document.getElementById('contextMenu').classList.add('hidden');
}

// ============================================================
//  POKEMON ACTIONS
// ============================================================

function killPokemonAt(pi, loc, idx, opts) {
  opts = opts || {};
  const player = state.players[pi];
  if (!player) return;
  const poke = loc === 'team' ? player.team[idx] : player.box[idx];
  if (!poke || poke.dead) return;

  poke.dead = true;
  player.deadBox.push({ ...poke });
  if (loc === 'team') player.team[idx] = null;
  else player.box.splice(idx, 1);

  if (!opts.silent) showToast(`💀 ${poke.nickname || poke.species} ist gestorben`, 'error');

  // Soullink: everyone sharing the same linkId dies too
  if (poke.linkId && !opts.skipCascade) {
    const partners = [];
    forEachPokemon((p2, p2i, p2loc, p2idx) => {
      if (p2.linkId === poke.linkId && !p2.dead) partners.push({ pi: p2i, loc: p2loc, idx: p2idx, poke: p2 });
    });
    partners.forEach(p => {
      const partnerName = p.poke.nickname || p.poke.species;
      const partnerPlayer = state.players[p.pi].name;
      killPokemonAt(p.pi, p.loc, p.idx, { skipCascade: true, silent: true });
      showToast(`🔗💀 Soullink: ${partnerName} (${partnerPlayer}) ist mitgestorben`, 'error');
    });
  }
}

function markDead(pi, loc, idx) {
  killPokemonAt(pi, loc, idx);
  renderPlayers();
  updateTotalDeaths();
  saveData();
}

function revivePoke(pi, loc, idx) {
  const poke = getPokeAt(pi, loc, idx);
  if (!poke) return;
  poke.dead = false;
  renderPlayers();
  saveData();
}

function removePoke(pi, loc, idx) {
  const player = state.players[pi];
  if (loc === 'team') player.team[idx] = null;
  else player.box.splice(idx, 1);
  renderPlayers();
  saveData();
}

// ============================================================
//  BOX MANAGEMENT
// ============================================================

function moveToBox(pi, si) {
  const player = state.players[pi];
  const poke = player.team[si];
  if (!poke) return;
  player.team[si] = null;
  player.box.push(poke);
  renderPlayers();
  saveData();
  showToast(`📦 ${poke.nickname || poke.species} in die Box verschoben`);
}

function moveToTeam(pi, bi) {
  const player = state.players[pi];
  const poke = player.box[bi];
  if (!poke) return;
  const emptyIdx = player.team.findIndex(s => s === null);
  if (emptyIdx === -1) {
    showToast('❗ Team ist voll — erst einen Platz freimachen', 'error');
    return;
  }
  player.box.splice(bi, 1);
  player.team[emptyIdx] = poke;
  renderPlayers();
  saveData();
  showToast(`⬆️ ${poke.nickname || poke.species} ins Team verschoben`);
}

// ============================================================
//  SOULLINK
// ============================================================

function openLinkPicker(pi, loc, idx) {
  linkPickerSource = { pi, loc, idx };
  const poke = getPokeAt(pi, loc, idx);
  if (!poke) return;

  const listEl = document.getElementById('linkPickerList');
  let html = '';
  state.players.slice(0, state.playerCount).forEach((player, ppi) => {
    if (ppi === pi) return;
    const mons = [
      ...player.team.map((p, i) => p ? { p, loc: 'team', idx: i } : null).filter(Boolean),
      ...player.box.map((p, i) => ({ p, loc: 'box', idx: i }))
    ];
    if (mons.length === 0) return;
    html += `<div class="link-picker-group"><div class="link-picker-player">${escHtml(player.name)}</div>`;
    mons.forEach(m => {
      const isPartner = poke.linkId && m.p.linkId === poke.linkId;
      html += `<div class="link-picker-item ${isPartner ? 'active' : ''}" onclick="selectLinkTarget(${ppi}, '${m.loc}', ${m.idx})">
        <img src="${m.p.sprite}" onerror="this.style.display='none'" />
        <span>${escHtml(m.p.nickname || m.p.species)}</span>
        ${m.p.linkId ? `<span class="link-picker-tag" style="background:${colorForLink(m.p.linkId)}">🔗</span>` : ''}
      </div>`;
    });
    html += `</div>`;
  });
  if (!html) html = `<div style="padding:12px;color:var(--text3);font-size:13px;">Keine anderen Spieler-Pokémon verfügbar.</div>`;

  listEl.innerHTML = html;
  document.getElementById('linkPickerTitle').textContent = `🔗 ${poke.nickname || poke.species} verlinken`;
  document.getElementById('linkPickerOverlay').classList.remove('hidden');
}

function closeLinkPicker() {
  const el = document.getElementById('linkPickerOverlay');
  if (el) el.classList.add('hidden');
  linkPickerSource = null;
}

function selectLinkTarget(targetPi, targetLoc, targetIdx) {
  if (!linkPickerSource) return;
  const { pi, loc, idx } = linkPickerSource;
  const a = getPokeAt(pi, loc, idx);
  const b = getPokeAt(targetPi, targetLoc, targetIdx);
  if (!a || !b) { closeLinkPicker(); return; }

  const groupId = a.linkId || b.linkId || makeUid();
  a.linkId = groupId;
  b.linkId = groupId;

  closeLinkPicker();
  renderPlayers();
  saveData();
  showToast(`🔗 ${a.nickname || a.species} & ${b.nickname || b.species} verlinkt!`);
}

function unlinkPokemon(pi, loc, idx) {
  const poke = getPokeAt(pi, loc, idx);
  if (!poke) return;
  poke.linkId = null;
  renderPlayers();
  saveData();
  showToast('✂️ Link entfernt');
}

function unlinkGroup(linkId) {
  forEachPokemon(poke => { if (poke.linkId === linkId) poke.linkId = null; });
  renderPlayers();
  saveData();
  showToast('✂️ Soullink-Gruppe getrennt');
}

function renderLinks() {
  const container = document.getElementById('linksSection');
  if (!container) return;

  const groups = {};
  forEachPokemon((poke, pi, loc, idx) => {
    if (!poke.linkId) return;
    (groups[poke.linkId] = groups[poke.linkId] || []).push({ poke, pi, loc, idx });
  });

  const linkIds = Object.keys(groups);
  if (linkIds.length === 0) {
    container.innerHTML = `<div class="links-empty">Noch keine Soullinks gesetzt. Öffne das Kontextmenü eines Pokémon (🔗-Symbol) um es mit dem Pokémon eines anderen Spielers zu verlinken.</div>`;
    return;
  }

  container.innerHTML = linkIds.map(id => {
    const members = groups[id];
    const color = colorForLink(id);
    const allDead = members.every(m => m.poke.dead);
    return `
      <div class="link-group ${allDead ? 'dead' : ''}" style="border-left-color:${color}">
        <div class="link-group-members">
          ${members.map(m => `
            <div class="link-member">
              <img src="${m.poke.sprite}" onerror="this.style.display='none'" />
              <span class="link-member-player">${escHtml(state.players[m.pi]?.name || '?')}</span>
              <span class="link-member-name">${escHtml(m.poke.nickname || m.poke.species)}${m.poke.dead ? ' 💀' : ''}</span>
            </div>
          `).join('<span class="link-connector">🔗</span>')}
        </div>
        <button class="btn btn-icon btn-sm" title="Gruppe trennen" onclick="unlinkGroup('${id}')">✂️</button>
      </div>
    `;
  }).join('');
}

function closeModal() {

function updateModalPreview(poke) {
  const typeBadges = poke.types.map(t =>
    `<span class="type-badge t-${t}" style="padding:2px 8px;font-size:10px;">${TYPE_DE[t] || t}</span>`
  ).join('');

      <div class="preview-name">${escHtml(poke.species)}</div>
      <div class="preview-types">${typeBadges}</div>

    </div>

async function onPokeSearchInput() {
  clearTimeout(searchDebounce);
  const q = document.getElementById('pokeSearch').value.trim().toLowerCase();
  if (!q) {
    document.getElementById('searchResults').classList.add('hidden');
    return;
  }
  searchDebounce = setTimeout(() => fetchPokeSearch(q), 350);
}

async function fetchPokeSearch(q) {
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--text2);">Suche... <span class="search-spinner"></span></div>`;
  resultsEl.classList.remove('hidden');

  try {
    // 1. Check German→English lookup table first (exact match)
    const deExact = DE_TO_EN[q];
    if (deExact) {
      const poke = await fetchPokemonByNameOrId(deExact);
      if (poke) {
        resultsEl.classList.add('hidden');
        selectedPokemon = poke;
        updateModalPreview(poke);
        return;
      }
    }

    // 2. Try direct API lookup (English name or #ID)
    const direct = await fetchPokemonByNameOrId(q);
    if (direct) {
      resultsEl.classList.add('hidden');
      selectedPokemon = direct;
      updateModalPreview(direct);
      return;
    }

    // 3. Partial match against German name lookup table
    const deMatches = Object.entries(DE_TO_EN)
      .filter(([de]) => de.includes(q))
      .slice(0, 8);

    // 4. Also build partial English name list from cached pokemon list
    if (!window._pokeList) {
      try {
        const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
        const d = await r.json();
        window._pokeList = d.results; // [{name, url}]
      } catch { window._pokeList = []; }
    }
    const enMatches = (window._pokeList || [])
      .filter(p => p.name.includes(q))
      .slice(0, 6);

    // Merge: German matches first, then English
    const combinedEnNames = [
      ...deMatches.map(([, en]) => en),
      ...enMatches.map(p => p.name),
    ];
    // Deduplicate
    const uniqueNames = [...new Set(combinedEnNames)].slice(0, 7);

    if (uniqueNames.length === 0) {
      resultsEl.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--text2);">Kein Pokémon gefunden 🔍</div>`;
      return;
    }

    // Fetch data for each match (parallel)
    const items = await Promise.all(uniqueNames.map(async name => {
      try {
        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        if (!r.ok) return null;
        const d = await r.json();
        // Find German display name from reverse lookup
        const deName = Object.keys(DE_TO_EN).find(k => DE_TO_EN[k] === d.name) || null;
        return {
          id: d.id,
          name: capitalize(d.name),
          deName: deName ? capitalize(deName) : null,
          sprite: d.sprites.front_default || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${d.id}.png`,
          types: d.types.map(t => t.type.name)
        };
      } catch { return null; }
    }));

    const valid = items.filter(Boolean);
    if (valid.length === 0) {
      resultsEl.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--text2);">Kein Pokémon gefunden 🔍</div>`;
      return;
    }

    resultsEl.innerHTML = valid.map(p => {
      const typesHtml = p.types.map(t =>
        `<span class="type-badge t-${t}" style="padding:1px 5px;font-size:8px;">${TYPE_DE[t]||t}</span>`
      ).join('');
      const safeSprite = p.sprite ? p.sprite.replace(/'/g, "\\'") : '';
      const safeName = p.name.replace(/'/g, "\\'");
      const safeTypes = JSON.stringify(p.types).replace(/"/g,"'");
      return `
        <div class="search-result-item" onclick="selectSearchResult(${p.id}, '${safeName}', '${safeSprite}', ${safeTypes})">
          <img src="${p.sprite}" onerror="this.style.display='none'" />
          <div>
            <div class="sr-name">${p.deName ? `${p.deName} <span style="color:var(--text3);font-size:10px;">(${p.name})</span>` : p.name}</div>
            <div class="sr-id">#${String(p.id).padStart(3,'0')}</div>
          </div>
          <div style="display:flex;gap:3px;margin-left:auto;">${typesHtml}</div>
        </div>`;
    }).join('');

  } catch (err) {
    console.error(err);
    resultsEl.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--accent);">Fehler: ${err.message}</div>`;
  }
}

async function fetchPokemonByNameOrId(query) {
  try {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${encodeURIComponent(query)}`);
    if (!res.ok) return null;
    const d = await res.json();
    // Try to find German display name
    const deName = Object.keys(DE_TO_EN).find(k => DE_TO_EN[k] === d.name);
    return {
      id: d.id,
      species: deName ? capitalize(deName) : capitalize(d.name),
      sprite: d.sprites.front_default || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${d.id}.png`,
      types: d.types.map(t => t.type.name)
    };
  } catch { return null; }
}

function selectSearchResult(id, name, sprite, types) {
  selectedPokemon = { id, species: name, sprite, types };
  updateModalPreview(selectedPokemon);
  document.getElementById('searchResults').classList.add('hidden');
  document.getElementById('pokeSearch').value = name;
}

function confirmAddPokemon() {
  if (!selectedPokemon) {
    showToast('Bitte erst ein Pokémon suchen!', 'error');
    return;
  }

  const nickname = document.getElementById('pokeNickname').value.trim();
  const location = document.getElementById('pokeLocation').value.trim();
  const { pi, loc, idx } = editingTarget;
  const player = state.players[pi];
  const existing = (idx === null || idx === undefined) ? null : getPokeAt(pi, loc, idx);

  const poke = {
    ...selectedPokemon,
    nickname,
    location,
    dead: existing ? existing.dead : false,
    uid: existing ? existing.uid : makeUid(),
    linkId: existing ? (existing.linkId || null) : null
  };

  if (loc === 'team') {
    player.team[idx] = poke;
  } else if (loc === 'box') {
    if (idx === null || idx === undefined) player.box.push(poke);
    else player.box[idx] = poke;
  }

  closeModal();
  renderPlayers();
  saveData();
  showToast(`✅ ${nickname || poke.species} hinzugefügt!`);
}

// ============================================================
//  AVATAR
// ============================================================

function promptAvatar(pi) {
  const url = prompt('Avatar-URL (Twitch/Bild-URL):', state.players[pi].avatarUrl || '');
  if (url === null) return;
  state.players[pi].avatarUrl = url.trim();
  renderPlayers();
  saveData();
}

function changeAvatar(pi) { promptAvatar(pi); }

// ============================================================
//  PERSIST
// ============================================================

function saveData() {
  try {
    localStorage.setItem('nuzlocke_v2', JSON.stringify(state));
  } catch(e) {}
}

function loadData() {
  try {
    const saved = localStorage.getItem('nuzlocke_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      // Ensure players array
      while (state.players.length < state.playerCount) {
        state.players.push(createPlayer(state.players.length + 1));
      }
    } else {
      // Default 3 players
      state.players = [1,2,3].map(n => createPlayer(n));
    }
  } catch(e) {
    state.players = [1,2,3].map(n => createPlayer(n));
  }
  // Migration: ensure every player has a box array (older saves may not have one)
  state.players.forEach(p => { if (!Array.isArray(p.box)) p.box = []; if (!Array.isArray(p.deadBox)) p.deadBox = []; });
}

function resetAll() {
  if (!confirm('Wirklich alles zurücksetzen?')) return;
  localStorage.removeItem('nuzlocke_v2');
  state = { runName:'', playerCount:3, gameId:'bw', completedGyms:[], players:[1,2,3].map(n=>createPlayer(n)) };
  document.getElementById('runName').value = '';
  document.getElementById('gameSelect').value = 'bw';
  renderPlayerCountSelect();
  renderGyms();
  renderPlayers();
  renderLinks();
  updateTotalDeaths();
  showToast('🔄 Alles zurückgesetzt!');
}

// ============================================================
//  HELPERS
// ============================================================

function updateTotalDeaths() {
  const total = state.players.slice(0, state.playerCount).reduce((s, p) => s + p.deadBox.length, 0);
  document.getElementById('totalDeathsLabel').innerHTML =
    `Gesamt Tode: <b style="color:var(--accent)">${total}</b>`;
}

function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast${type==='error'?' error':''}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function capitalize(str) {
  if (!str) return str;
  // Capitalize each word for German names
  return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('-');
}

// ============================================================
//  BOOT
// ============================================================
init();
</script>
